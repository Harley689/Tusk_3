<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dead Code</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    background:#050505;
    color:white;
    direction:rtl;
    overflow-x:hidden;
}

/* particles */
#particles{
    position:fixed;
    inset:0;
    z-index:-1;
}

/* header */
header{
    display:flex;
    justify-content:space-between;
    padding:18px 45px;
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    font-size:26px;
    font-weight:900;
    color:#ff2e2e;
}

.code{
    font-size:13px;
    color:#aaa;
}

/* hero */
.hero{
    text-align:center;
    margin-top:80px;
}

.hero h1{
    font-size:42px;
    color:gold;
}

.typing{
    margin-top:10px;
    color:#ccc;
    font-size:17px;
    min-height:25px;
}

/* robot container */
.hero-image{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

#robot-container{
    width:350px;
    height:450px;
    border-radius:15px;
    border:3px solid gold;
    box-shadow:0 0 25px rgba(255,215,0,0.25);
    overflow:hidden;
}

/* card */
.card{
    width:340px;
    margin:60px auto;
    border-radius:15px;
    overflow:hidden;
    background:rgba(255,255,255,0.05);
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    transform:translateY(40px);
    opacity:0;
    transition:0.6s;
}

.card.show{
    transform:translateY(0);
    opacity:1;
}

/* responsive */
@media(max-width:600px){
    header{padding:15px 20px;}
    .hero h1{font-size:28px;}
    #robot-container{width:90%; height:400px;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
    <div class="logo">Dead Code</div>
    <div class="code">CIA3375G</div>
</header>

<div class="hero">
    <h1>🌺 صلي على النبي</h1>
    <div class="typing" id="typing"></div>

    <div class="hero-image">
        <div id="robot-container"></div>
    </div>
</div>

<div class="card" id="card"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

/* typing */
const text = "مرحباً بك في موقع فريق Dead Code";
let i = 0;

function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 60);
    }
}
typing();

/* scroll animation */
window.addEventListener("scroll",()=>{
    const card = document.getElementById("card");
    if(card.getBoundingClientRect().top < window.innerHeight/1.3){
        card.classList.add("show");
    }
});

/* particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<40;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        s:Math.random()*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="rgba(255,215,0,0.4)";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y -= p.s;
        if(p.y < 0) p.y = canvas.height;
    });

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

/* ===================== */
/* 🤖 3D ROBOT */
/* ===================== */

const container = document.getElementById("robot-container");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

/* light */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

/* robot */
const material = new THREE.MeshStandardMaterial({color:0x00ffcc});
const robot = new THREE.Group();

/* body */
const body = new THREE.Mesh(new THREE.BoxGeometry(1,1.5,0.5), material);
robot.add(body);

/* head */
const head = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.7), material);
head.position.y = 1.3;
robot.add(head);

/* eyes */
const eyeMaterial = new THREE.MeshBasicMaterial({color:0x000000});
const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.08), eyeMaterial);
const eye2 = new THREE.Mesh(new THREE.SphereGeometry(0.08), eyeMaterial);

eye1.position.set(-0.2,1.3,0.36);
eye2.position.set(0.2,1.3,0.36);

robot.add(eye1);
robot.add(eye2);

/* arms */
const armGeo = new THREE.BoxGeometry(0.3,1,0.3);

const leftArm = new THREE.Mesh(armGeo, material);
leftArm.position.set(-0.9,0.2,0);
robot.add(leftArm);

const rightArm = new THREE.Mesh(armGeo, material);
rightArm.position.set(0.9,0.2,0);
robot.add(rightArm);

/* legs */
const legGeo = new THREE.BoxGeometry(0.4,1,0.4);

const leftLeg = new THREE.Mesh(legGeo, material);
leftLeg.position.set(-0.3,-1.5,0);
robot.add(leftLeg);

const rightLeg = new THREE.Mesh(legGeo, material);
rightLeg.position.set(0.3,-1.5,0);
robot.add(rightLeg);

scene.add(robot);

/* animation */
function animate(){
    requestAnimationFrame(animate);

    robot.rotation.y += 0.01;

    controls.update();
    renderer.render(scene, camera);
}
animate();

/* resize */
window.addEventListener("resize",()=>{
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});

</script>

</body>
</html>
